server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;
    client_max_body_size 30m;

    # Resolve the backend through Docker DNS at request time. Using a variable
    # prevents Nginx from exiting when the app container is briefly unavailable
    # during startup or redeployment.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $app_backend http://app:3001;

    location / {
        proxy_pass $app_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
