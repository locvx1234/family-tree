services:
  family-tree:
    build:
      context: .
      dockerfile: Dockerfile
    image: family-tree:latest
    restart: unless-stopped
    init: true
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATA_DIR: /app/server/data
      # Optional. If omitted, the app generates a secret in the persistent volume.
      JWT_SECRET: "${JWT_SECRET:-}"
      # Optional. Khi đủ 3 giá trị, nút "Tiếp tục với Google" tự động xuất hiện.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
    volumes:
      - family_tree_data:/app/server/data
    networks:
      family_tree_network:
        aliases:
          - app
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    init: true
    depends_on:
      family-tree:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - family_tree_network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  family_tree_data:
  certbot_webroot:
  letsencrypt:

networks:
  family_tree_network:
    driver: bridge
